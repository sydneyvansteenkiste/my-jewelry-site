<!DOCTYPE html>
<html>
<head>
    <title>Little Bird Price Estimator</title>
    <style>
        body { font-family: sans-serif; background: #fffdf5; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .app-box { background: white; padding: 30px; border-radius: 20px; border: 2px solid #D4AF37; box-shadow: 0 10px 20px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        select, input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #D4AF37; border-radius: 5px; }
        button { background: #D4AF37; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
        #total-display { font-size: 1.8em; color: #D4AF37; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="app-box">
        <h2>Price Estimator</h2>
        <label>Select Metal:</label>
        <select id="metal">
            <option value="45">14k Gold ($45/in)</option>
            <option value="15">Sterling Silver ($15/in)</option>
            <option value="25">Gold Filled ($25/in)</option>
        </select>
        
        <label>Length (Inches):</label>
        <input type="number" id="length" value="7">
        
        <button onclick="calc()">Calculate Estimate</button>
        <div id="total-display">$0</div>
        <p><a href="scratch.html" style="color: #666; font-size: 0.8em;">Back to Scratch Page</a></p>
    </div>

    <script>
        function calc() {
            const price = document.getElementById('metal').value;
            const len = document.getElementById('length').value;
            document.getElementById('total-display').innerText = "$" + (price * len);
        }
    </script>
</body>
</html>
